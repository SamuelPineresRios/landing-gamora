<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batmobile: Gotham City Pursuit [DELAYED MOBILE]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .neo-glass {
            background: rgba(255,255, 255, 0.15);
            backdrop-filter: blur(10px) saturate(180%);
            -webkit-backdrop-filter: blur(10px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            color: #e0ffe0;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            opacity: 1;
        }

        #top-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            width: 90%;
            justify-content: space-between;
        }

        .hud-panel { 
            padding: 10px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-width: 100px; 
        }
        .hud-label { font-size: 10px; color: rgba(255, 255, 255, 0.8); letter-spacing: 2px; margin-bottom: 4px; text-shadow: 0 0 2px rgba(0,0,0,0.5); }
        .hud-value { font-size: 28px; font-weight: bold; text-shadow: 0 0 10px rgba(0, 255, 65, 0.8); }

        #life-panel {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            padding: 5px 15px;
        }
        .life-pip {
            width: 15px;
            height: 6px;
            background: #00ff41;
            box-shadow: 0 0 5px #00ff41;
            transition: background 0.3s;
        }
        .life-pip.lost {
            background: rgba(255, 0, 0, 0.2);
            box-shadow: none;
        }

        #cheat-list {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            pointer-events: none;
        }
        .cheat-item {
            color: #fff;
            font-size: 11px;
            letter-spacing: 1px;
            text-shadow: 0 0 2px #000;
        }
        .cheat-code {
            color: #ffff00;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 255, 0, 0.5);
        }

        #weapon-system {
            position: absolute;
            bottom: 30px;
            right: 30px;
            text-align: right;
            transform: skewX(-10deg);
            padding: 15px;
        }
        .ammo-pip {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ff41;
            margin-left: 3px;
            box-shadow: 0 0 5px #00ff41;
            transition: 0.2s;
        }
        .ammo-pip.empty { background: rgba(0,0,0,0.3); box-shadow: none; }

        #dashboard {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            padding: 15px;
        }
        .gauge-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #00ff41;
            border-right: 3px solid #00ff41;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-45deg);
        }
        .gauge-inner { transform: rotate(45deg); text-align: center; }

        #nitro-bar-container {
            width: 250px;
            height: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #00ff41;
            transform: skewX(-20deg);
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
        }
        #nitro-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #004d00, #00ff41, #fff);
            transform-origin: left;
            transition: transform 0.1s;
        }

        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transform: translateY(50px);
            animation: slideUpFade 0.8s ease-out 4s forwards;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .mobile-btn {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            font-family: 'Share Tech Mono';
            pointer-events: none;
            user-select: none;
            touch-action: manipulation;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .mobile-btn:active {
            background: rgba(0, 255, 65, 0.4);
            transform: scale(0.95);
        }

        .btn-left { bottom: 40px; left: 30px; }
        .btn-right { bottom: 40px; left: 130px; }
        .btn-boost { bottom: 40px; right: 130px; width: 90px; height: 90px; border-radius: 50%; color: #00ffff; }
        .btn-fire { bottom: 40px; right: 30px; width: 70px; height: 70px; border-radius: 50%; border-color: #ff0055; color: #ff0055; }

        #mobile-cheat-trigger {
            display: none;
            position: absolute;
            top: 100px;
            right: 20px;
            padding: 10px 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 30;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.8s ease-out 4s forwards;
        }

        #mobile-cheat-panel {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        #mobile-cheat-input {
            background: rgba(0,0,0,0.5);
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 15px;
            font-size: 20px;
            font-family: 'Share Tech Mono';
            width: 80%;
            max-width: 400px;
            text-transform: uppercase;
            text-align: center;
            outline: none;
        }
        .close-cheat {
            margin-top: 20px;
            background: transparent;
            border:1px solid #fff;
            color: #fff;
            padding: 10px 30px;
            font-family: 'Share Tech Mono';
        }

        @media (max-width: 1024px) {
            #mobile-controls { display: block; }
            #mobile-cheat-trigger { display: block; }
            #cheat-list { display: none; }
            #dashboard { transform: scale(0.8); bottom: 10px; left: 10px; }
            #weapon-system { transform: scale(0.8); bottom: 10px; right: 10px; }
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%);
            z-index: 5;
            pointer-events: none;
        }
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 6;
            pointer-events: none;
            opacity: 0.4;
        }
        
        .toast {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 10px currentColor;
            z-index: 200;
            pointer-events: none;
            text-align: center;
        }
        .warning-text { color: #ff0055; text-shadow: 0 0 20px #ff0055; font-size: 32px; font-weight: bold; display: none; }
        
        #cheat-indicator {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: #000;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 5px #fff;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 10px;
            border: 1px solid #fff;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 0 15px #fff;
        }

        #game-timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 5px 10px;
            background: rgba(0,0,0,0.3);
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
        }

        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            pointer-events: all;
        }
        .go-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 60px;
            color: #ff0055;
            text-shadow: 0 0 30px rgba(255, 0, 85, 0.8);
            margin-bottom: 20px;
            transform: skewX(-10deg);
            text-align: center;
        }
        
        .restart-btn {
            padding: 20px 60px;
            color: #fff;
            border: none;
            font-family: 'Share Tech Mono';
            font-size: 24px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: 0.3s;
            text-shadow: 0 0 10px #000;
            pointer-events: auto;
        }
        .restart-btn:hover {
            background: rgba(255, 255, 255, 0.4); 
            color: #000;
            text-shadow: none;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="hud-panel neo-glass">
                <div class="hud-label">DISTANCE</div>
                <div class="hud-value" id="score-val">0</div>
            </div>
            <div class="hud-panel neo-glass">
                <div class="hud-label">SYSTEM</div>
                <div class="hud-value" id="status-val" style="font-size: 18px; color:#00ff41;">ONLINE</div>
            </div>
        </div>

        <div id="life-panel" class="neo-glass">
            <div class="life-pip"></div><div class="life-pip"></div><div class="life-pip"></div>
            <div class="life-pip"></div><div class="life-pip"></div><div class="life-pip"></div>
        </div>

        <div id="game-timer">TIME: <span id="time-val">0.0</span>s</div>

        <div id="cheat-list" class="neo-glass">
            <div class="cheat-item">GOD MODE: <span class="cheat-code">WAYNE</span></div>
            <div class="cheat-item">INF NITRO: <span class="cheat-code">GOTHAM</span></div>
            <div class="cheat-item">CHAOS: <span class="cheat-code">JOKER</span></div>
        </div>

        <div id="dashboard" class="neo-glass">
            <div class="gauge-circle">
                <div class="gauge-inner">
                    <div id="speed-val" class="hud-value">0</div>
                    <div class="hud-label">MPH</div>
                </div>
            </div>
            <div>
                <div class="hud-label" style="margin-left:5px;">AFTERBURNER</div>
                <div id="nitro-bar-container">
                    <div id="nitro-fill"></div>
                </div>
            </div>
        </div>

        <div id="weapon-system" class="neo-glass">
            <div class="hud-label">BATARANG</div>
            <div id="ammo-container" style="margin-top: 5px;">
                <span class="ammo-pip"></span><span class="ammo-pip"></span><span class="ammo-pip"></span>
            </div>
        </div>

        <div id="cheat-indicator">CHEAT ACTIVATED</div>
        <div class="toast warning-text" id="collision-warn">IMPACT DETECTED</div>
    </div>

    <button id="mobile-cheat-trigger" class="neo-glass">CHEAT</button>
    
    <div id="mobile-cheat-panel">
        <div class="hud-label" style="margin-bottom:10px;">TYPE CHEAT CODE</div>
        <input type="text" id="mobile-cheat-input" placeholder="WAYNE / GOTHAM / JOKER">
        <button class="close-cheat" id="close-mobile-cheat">CLOSE</button>
    </div>

    <div id="mobile-controls">
        <div class="mobile-btn btn-left" id="mob-left">&lt;</div>
        <div class="mobile-btn btn-right" id="mob-right">&gt;</div>
        <div class="mobile-btn btn-boost" id="mob-boost">NITRO</div>
        <div class="mobile-btn btn-fire" id="mob-fire">FIRE</div>
    </div>

    <div id="game-over-screen">
        <div class="go-title">CRITICAL FAILURE</div>
        <p style="color:#fff; font-family:'Share Tech Mono'; margin-bottom:30px;">HULL INTEGRITY ZERO</p>
        <button class="restart-btn neo-glass" id="restart-btn">REBOOT SYSTEM</button>
    </div>

    <script>
        // ============== CONFIG & STATE ==============
        const CONFIG = {
            laneWidth: 3.5,
            speed: { base: 0.5, max: 1.2, nitro: 2.2, current: 0.8 },
            nitro: { amount: 100, drain: 0.35, regen: 0.15 },
            camera: { shake: 0, fovBase: 70, fovNitro: 100 },
            cheats: { god: false, infinite: false, chaos: false }
        };

        const STATE = {
            playing: true,
            gameOver: false,
            score: 0,
            lives: 6,
            frame: 0,
            batarangs: 3,
            cheatBuffer: "",
            randomCheatTriggered: false,
            startTime: 0,
            playerRoadDist: 0
        };

        let activeCheatTimers = { god: null, infinite: null, chaos: null };

        // ============== THREE.JS SETUP ==============
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.006);

        const camera = new THREE.PerspectiveCamera(CONFIG.camera.fovBase, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3.5, 9);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        container.appendChild(renderer.domElement);

        // ============== POST PROCESSING ==============
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 2.0;
        bloomPass.radius = 0.6;
        bloomPass.threshold = 0.15;

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // ============== LIGHTING ==============
        const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
        scene.add(ambientLight);
        const zoneAmbient = { current: 0x404040, target: 0x404040, intensity: 0.4, targetIntensity: 0.4 };

        const dirLight = new THREE.DirectionalLight(0x110022, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const zoneLight = new THREE.PointLight(0xffaa00, 0, 60);
        zoneLight.position.set(0, 15, 0);
        scene.add(zoneLight);

        // ============== MATERIALS ==============
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.1, metalness: 0.9 });
        const bridgeRoadMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.3, metalness: 0.95 });
        const tunnelRoadMat = new THREE.MeshStandardMaterial({ color: 0x050510, roughness: 0.2, metalness: 0.8 });
        const neonBlue = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const neonRed = new THREE.MeshBasicMaterial({ color: 0xff0033 });
        const neonGreen = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
        const streetLightMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const headlightMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
        const carPaintMat = new THREE.MeshStandardMaterial({ color: 0x0033cc, roughness: 0.3, metalness: 0.7 });
        const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 });
        const bridgeMetalMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.4, metalness: 0.9 });
        const tunnelWallMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.3, metalness: 0.7 });
        const tunnelLEDMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const tunnelEmergMat = new THREE.MeshBasicMaterial({ color: 0xff0033 });

        // ============== ROAD PATH SYSTEM ==============
        const PATH = {
            points: [],
            step: 8,
            generatedTo: 0,
            x: 0, y: 0, angle: 0,
            chunkRemaining: 0,
            chunkType: 'straight',
            chunkCurve: 0,
            chunkSlope: 0,
            bridgeRemaining: 0,
            tunnelRemaining: 0,
            featureCooldown: 20,

            init: function() {
                this.points = [];
                this.x = 0; this.y = 0; this.angle = 0;
                this.chunkRemaining = 0;
                this.bridgeRemaining = 0;
                this.tunnelRemaining = 0;
                this.featureCooldown = 20;
                this.generatedTo = 0;
                this.generateTo(2000);
            },

            generateTo: function(targetDist) {
                while (this.generatedTo < targetDist) {
                    this._advance();
                    this.generatedTo += this.step;
                }
            },

            _advance: function() {
                let curve = 0, slope = 0, type = 'city';

                if (this.bridgeRemaining > 0) {
                    this.bridgeRemaining--;
                    type = 'bridge';
                    curve = 0;
                    if (this.bridgeRemaining === 0) this.featureCooldown = 25 + Math.floor(Math.random() * 20);
                } else if (this.tunnelRemaining > 0) {
                    this.tunnelRemaining--;
                    type = 'tunnel';
                    curve = 0;
                    if (this.tunnelRemaining === 0) this.featureCooldown = 20 + Math.floor(Math.random() * 15);
                } else {
                    if (this.chunkRemaining <= 0) {
                        this._pickChunk();
                    }
                    this.chunkRemaining--;
                    curve = this.chunkCurve;
                    slope = this.chunkSlope;
                    type = this.chunkType === 'bridge' ? 'bridge' : (this.chunkType === 'tunnel' ? 'tunnel' : 'city');

                    if (this.chunkRemaining <= 0 && this.featureCooldown <= 0 && type === 'city') {
                        const r = Math.random();
                        if (r < 0.06 && this.bridgeRemaining === 0 && this.tunnelRemaining === 0) {
                            this.bridgeRemaining = 4 + Math.floor(Math.random() * 4);
                            this.featureCooldown = 30;
                            type = 'bridge';
                        } else if (r < 0.12 && this.bridgeRemaining === 0 && this.tunnelRemaining === 0) {
                            this.tunnelRemaining = 3 + Math.floor(Math.random() * 3);
                            this.featureCooldown = 25;
                            type = 'tunnel';
                        }
                    }
                }

                if (this.featureCooldown > 0 && this.bridgeRemaining === 0 && this.tunnelRemaining === 0) {
                    this.featureCooldown--;
                }

                this.angle += curve;
                this.angle = Math.max(-0.45, Math.min(0.45, this.angle));

                this.x += Math.sin(this.angle) * this.step;
                this.y += slope;
                this.y = Math.max(-6, Math.min(12, this.y));

                const z = this.generatedTo;
                this.points.push({
                    x: this.x, y: this.y, z: z,
                    angle: this.angle,
                    slope: slope / this.step,
                    type: type
                });
            },

            _pickChunk: function() {
                const r = Math.random();
                if (r < 0.30) {
                    this.chunkType = 'straight';
                    this.chunkCurve = 0;
                    this.chunkSlope = 0;
                    this.chunkRemaining = 6 + Math.floor(Math.random() * 12);
                } else if (r < 0.48) {
                    this.chunkType = 'curve_left';
                    this.chunkCurve = 0.01 + Math.random() * 0.03;
                    this.chunkSlope = 0;
                    this.chunkRemaining = 8 + Math.floor(Math.random() * 12);
                } else if (r < 0.66) {
                    this.chunkType = 'curve_right';
                    this.chunkCurve = -(0.01 + Math.random() * 0.03);
                    this.chunkSlope = 0;
                    this.chunkRemaining = 8 + Math.floor(Math.random() * 12);
                } else if (r < 0.78) {
                    this.chunkType = 'scurve';
                    this.chunkCurve = (Math.random() > 0.5 ? 1 : -1) * (0.02 + Math.random() * 0.03);
                    this.chunkSlope = 0;
                    this.chunkRemaining = 10 + Math.floor(Math.random() * 10);
                } else if (r < 0.88) {
                    this.chunkType = 'uphill';
                    this.chunkCurve = (Math.random() - 0.5) * 0.015;
                    this.chunkSlope = 0.15 + Math.random() * 0.35;
                    this.chunkRemaining = 6 + Math.floor(Math.random() * 8);
                } else {
                    this.chunkType = 'downhill';
                    this.chunkCurve = (Math.random() - 0.5) * 0.015;
                    this.chunkSlope = -(0.15 + Math.random() * 0.35);
                    this.chunkRemaining = 6 + Math.floor(Math.random() * 8);
                }
            },

            getInfo: function(dist) {
                if (dist < 0) {
                    const p0 = this.points[0] || { x:0, y:0, z:0, angle:0, slope:0, type:'city' };
                    const p1 = this.points[1] || p0;
                    const dz = p1.z - p0.z || this.step;
                    return {
                        x: p0.x + (p1.x - p0.x) * (dist / dz),
                        y: p0.y + (p1.y - p0.y) * (dist / dz),
                        z: dist,
                        angle: p0.angle,
                        slope: p0.slope,
                        type: p0.type
                    };
                }
                this.generateTo(dist + 200);
                const idx = Math.floor(dist / this.step);
                if (idx >= this.points.length - 1) return this.points[this.points.length - 1];
                const p0 = this.points[idx];
                const p1 = this.points[idx + 1];
                const frac = (dist - idx * this.step) / this.step;
                return {
                    x: p0.x + (p1.x - p0.x) * frac,
                    y: p0.y + (p1.y - p0.y) * frac,
                    z: p0.z + (p1.z - p0.z) * frac,
                    angle: p0.angle + (p1.angle - p0.angle) * frac,
                    slope: p0.slope,
                    type: p0.type
                };
            },

            trim: function(minDist) {
                while (this.points.length > 500 && this.points[0].z < minDist - 500) {
                    this.points.shift();
                }
            },

            reset: function() {
                this.points = [];
                this.x = 0; this.y = 0; this.angle = 0;
                this.chunkRemaining = 0;
                this.bridgeRemaining = 0;
                this.tunnelRemaining = 0;
                this.featureCooldown = 20;
                this.generatedTo = 0;
                this.generateTo(2000);

                const info = PATH.getInfo(roadDist);

                    y: info.y - playerInfo.y,
                    z: playerInfo.z - info.z,
                    angle: info.angle,
                    slope: info.slope,
                    type: info.type

            updateAll: function() {
                const recycleRange = this.visibleAhead + this.visibleBehind;

                for (let i = 0; i < this.pool.length; i++) {
                    const group = this.pool[i];
                    let rd = group.userData.roadDist;

                    while (rd < minDist) rd += recycleRange;
                    while (rd > maxDist) rd -= recycleRange;
                    group.userData.roadDist = rd;

                    const pos = this.getRoadPos(rd);
                    group.position.set(pos.x, pos.y, pos.z);
                    group.rotation.y = -pos.angle;
                    group.rotation.x = 0;

                    const newType = pos.type;

                        this._swapType(group, newType);
                        group.userData.curType = newType;

            if (STATE.gameOver) return;
            let group = ENEMY_POOL.find(e => !e.userData.alive && !e.parent);

            }
            const roadDist = STATE.playerRoadDist + 120 + Math.random() * 150;
            const info = PATH.getInfo(roadDist);
            const playerInfo = PATH.getInfo(STATE.playerRoadDist);
            const lane = (Math.floor(Math.random() * 3) - 1) * CONFIG.laneWidth;
            const perpX = -Math.cos(info.angle);
            const perpZ = -Math.sin(info.angle);
            group.position.set(

                info.y - playerInfo.y,
                playerInfo.z - info.z + perpZ * lane
            );
            group.rotation.y = -info.angle;

            group.userData.laneOffset = lane;
            group.userData.alive = true;
            group.userData.targetLane = lane;
            group.visible = true;
            scene.add(group);
            enemies.push(group);
        }

        function recycleEnemy(group) {
            group.userData.alive = false;
            group.visible = false;
            scene.remove(group);
        }

        // ============== PROJECTILES & PARTICLES ==============
        const projectiles = [];
        const batrangGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.1, 3);
        const particles = [];
        const particleGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);

        function createExplosion(pos, color) {
            for (let i = 0; i < 25; i++) {
                const mesh = new THREE.Mesh(particleGeo, new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 }));
                mesh.position.copy(pos);
                mesh.userData.vel = new THREE.Vector3((Math.random() - 0.5) * 1.5, (Math.random() * 1.0) + 0.5, (Math.random() - 0.5) * 1.5);
                mesh.userData.life = 1.0;
                scene.add(mesh);
                particles.push(mesh);
            }
        }

        // ============== GAME LOGIC ==============
        let playerX = 0;
        let playerVelX = 0;
        const keys = { w: false, a: false, s: false, d: false, space: false };

        // ============== MOBILE TOUCH LOGIC ==============
        const mobLeft = document.getElementById('mob-left');
        const mobRight = document.getElementById('mob-right');
        const mobBoost = document.getElementById('mob-boost');
        const mobFire = document.getElementById('mob-fire');
        const mobileCheatInput = document.getElementById('mobile-cheat-input');
        const mobileCheatPanel = document.getElementById('mobile-cheat-panel');
        const mobControls = document.getElementById('mobile-controls');
        const mobCheatTrigger = document.getElementById('mobile-cheat-trigger');

        setTimeout(() => {
            mobControls.style.pointerEvents = 'all';
            Array.from(mobControls.children).forEach(btn => btn.style.pointerEvents = 'auto');
            mobCheatTrigger.style.pointerEvents = 'all';
        }, 4000);

        function bindTouch(elem, keyStart, keyEnd) {
            elem.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (keyStart === 'a') keys.a = true;
                if (keyStart === 'd') keys.d = true;
                if (keyStart === ' ') keys.space = true;
                if (keyStart === 'f') fireWeapon();
            });
            elem.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (keyEnd === 'a') keys.a = false;
                if (keyEnd === 'd') keys.d = false;
                if (keyEnd === ' ') keys.space = false;
            });
        }

        bindTouch(mobLeft, 'a', 'a');
        bindTouch(mobRight, 'd', 'd');
        bindTouch(mobBoost, ' ', ' ');
        bindTouch(mobFire, 'f', 'f');

        document.getElementById('mobile-cheat-trigger').addEventListener('click', () => {
            mobileCheatPanel.style.display = 'flex';
            mobileCheatInput.value = "";
            mobileCheatInput.focus();
        });

        document.getElementById('close-mobile-cheat').addEventListener('click', () => {
            mobileCheatPanel.style.display = 'none';
            mobileCheatInput.blur();
        });

        mobileCheatInput.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            if (val.includes("WAYNE")) { triggerCheat('god', 'GOD MODE'); e.target.value = ""; }
            if (val.includes("GOTHAM")) { triggerCheat('infinite', 'INFINITE NITRO'); e.target.value = ""; }
            if (val.includes("JOKER")) { triggerCheat('chaos', 'CHAOS MODE'); e.target.value = ""; }
        });

        // ============== UI UPDATERS ==============
        function updateLifeUI() {
            const pips = document.querySelectorAll('.life-pip');
            pips.forEach((pip, index) => {
                if (index < STATE.lives) pip.classList.remove('lost');
                else pip.classList.add('lost');
            });
        }

        // ============== CHEAT MANAGER ==============
        function triggerCheat(type, name) {
            CONFIG.cheats[type] = true;
            if (type === 'chaos') {
                scene.fog.color.setHex(0x220033);
                ambientLight.color.setHex(0x00ff00);
            }
            if (type === 'god' || (type === 'chaos' && CONFIG.cheats.god)) {
                document.getElementById('status-val').innerText = type === 'god' ? "GOD MODE" : "JOKER VENOM";
                document.getElementById('status-val').style.color = type === 'god' ? "#ffff00" : "#ff00ff";
            }
            if (activeCheatTimers[type]) clearTimeout(activeCheatTimers[type]);
            const el = document.getElementById('cheat-indicator');
            el.innerText = name + " ACTIVATED [25s]";
            el.style.opacity = 1;
            let secondsLeft = 25;
            const countdownInterval = setInterval(() => {
                secondsLeft--;
                el.innerText = name + " [" + secondsLeft + "s]";
                if (secondsLeft <= 0) clearInterval(countdownInterval);
            }, 1000);
            activeCheatTimers[type] = setTimeout(() => {
                CONFIG.cheats[type] = false;
                clearInterval(countdownInterval);
                if (type === 'chaos') {
                    scene.fog.color.setHex(0x020205);
                    ambientLight.color.setHex(0x404040);
                    if (!CONFIG.cheats.god) {
                        document.getElementById('status-val').innerText = "ONLINE";
                        document.getElementById('status-val').style.color = "#00ff41";
                    } else {
                        document.getElementById('status-val').innerText = "GOD MODE";
                        document.getElementById('status-val').style.color = "#ffff00";
                    }
                }
                if (type === 'god' && !CONFIG.cheats.chaos) {
                    document.getElementById('status-val').innerText = "ONLINE";
                    document.getElementById('status-val').style.color = "#00ff41";
                }
                el.innerText = name + " DEACTIVATED";
                setTimeout(() => { el.style.opacity = 0; }, 2000);
            }, 25000);
        }

        // ============== DESKTOP KEYBOARD EVENTS ==============
        document.addEventListener('keydown', (e) => {
            if (STATE.gameOver) return;
            const k = e.key.toLowerCase();
            if (k === 'a' || k === 'arrowleft') keys.a = true;
            if (k === 'd' || k === 'arrowright') keys.d = true;
            if (k === ' ') keys.space = true;
            if (k === 'f') fireWeapon();
            STATE.cheatBuffer += k;
            if (STATE.cheatBuffer.length > 15) STATE.cheatBuffer = STATE.cheatBuffer.slice(-15);
            if (STATE.cheatBuffer.toLowerCase().includes("wayne")) { triggerCheat('god', 'GOD MODE'); STATE.cheatBuffer = ""; }
            if (STATE.cheatBuffer.toLowerCase().includes("gotham")) { triggerCheat('infinite', 'INFINITE NITRO'); STATE.cheatBuffer = ""; }
            if (STATE.cheatBuffer.toLowerCase().includes("joker")) { triggerCheat('chaos', 'CHAOS MODE'); STATE.cheatBuffer = ""; }
        });

        document.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'a' || k === 'arrowleft') keys.a = false;
            if (k === 'd' || k === 'arrowright') keys.d = false;
            if (k === ' ') keys.space = false;
        });

        function fireWeapon() {
            if (STATE.batarangs > 0) {
                STATE.batarangs--;
                updateAmmo();
                const p = new THREE.Mesh(batrangGeo, neonBlue);
                p.rotation.x = Math.PI / 2;
                p.position.copy(carGroup.position);
                p.position.y = 1;
                scene.add(p);
                projectiles.push(p);
                if (STATE.batarangs === 2) setTimeout(reloadAmmo, 2000);
            }
        }

        function reloadAmmo() {
            if (STATE.batarangs < 3) {
                STATE.batarangs++;
                updateAmmo();
                if (STATE.batarangs < 3) setTimeout(reloadAmmo, 2000);
            }
        }

        function updateAmmo() {
            const container = document.getElementById('ammo-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const pip = document.createElement('span');
                pip.className = i < STATE.batarangs ? 'ammo-pip' : 'ammo-pip empty';
                container.appendChild(pip);
            }
        }

        // ============== GAME OVER & RESTART ==============
        function gameOver() {
            STATE.playing = false;
            STATE.gameOver = true;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function restartGame() {
            STATE.playing = true;
            STATE.gameOver = false;
            STATE.lives = 6;
            STATE.score = 0;
            STATE.randomCheatTriggered = false;
            STATE.startTime = clock.getElapsedTime();
            STATE.playerRoadDist = 0;
            updateLifeUI();
            CONFIG.speed.current = CONFIG.speed.base;
            CONFIG.nitro.amount = 100;
            playerX = 0;
            playerVelX = 0;
            carGroup.position.set(0, 0, 0);
            enemies.forEach(e => recycleEnemy(e));
            enemies.length = 0;
            projectiles.forEach(p => scene.remove(p));
            projectiles.length = 0;
            particles.forEach(p => { scene.remove(p); });
            particles.length = 0;
            PATH.reset();
            document.getElementById('game-over-screen').style.display = 'none';
        }

        document.getElementById('restart-btn').addEventListener('click', restartGame);
        setInterval(spawnEnemy, 1500);

        // ============== MAIN LOOP ==============
        const clock = new THREE.Clock();
        STATE.startTime = clock.getElapsedTime();
        let lastZoneType = 'city';

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();
            const playTime = time - STATE.startTime;

            document.getElementById('time-val').innerText = playTime.toFixed(1);

            // Random cheat at 45s
            if (!STATE.randomCheatTriggered && playTime > 45) {
                STATE.randomCheatTriggered = true;
                const cheats = [
                    { key: 'god', name: 'AUTO: GOD MODE' },
                    { key: 'infinite', name: 'AUTO: INFINITE NITRO' },
                    { key: 'chaos', name: 'AUTO: CHAOS MODE' }
                ];
                const pick = cheats[Math.floor(Math.random() * cheats.length)];
                triggerCheat(pick.key, pick.name);
            }

            // Speed & nitro
            let activeSpeed = STATE.playing ? CONFIG.speed.current : 0;
            const moveSpeed = activeSpeed * 80 * delta;
            STATE.playerRoadDist += moveSpeed;

            let isBoosting = false;
            const nitroAvailable = CONFIG.nitro.amount > 0 || CONFIG.cheats.infinite;
            if (keys.space && nitroAvailable && STATE.playing) {
                isBoosting = true;
                CONFIG.speed.current = THREE.MathUtils.lerp(CONFIG.speed.current, CONFIG.speed.nitro, 0.08);
                if (!CONFIG.cheats.infinite) CONFIG.nitro.amount -= CONFIG.nitro.drain;
                else CONFIG.nitro.amount = 100;
                CONFIG.camera.shake = 0.3;
                camera.fov = THREE.MathUtils.lerp(camera.fov, CONFIG.camera.fovNitro, 0.05);
            } else {
                CONFIG.speed.current = THREE.MathUtils.lerp(CONFIG.speed.current, CONFIG.speed.base, 0.04);
                if (!CONFIG.cheats.infinite) CONFIG.nitro.amount = Math.min(100, CONFIG.nitro.amount + CONFIG.nitro.regen);
                camera.fov = THREE.MathUtils.lerp(camera.fov, CONFIG.camera.fovBase, 0.05);
            }
            camera.updateProjectionMatrix();

            document.getElementById('nitro-fill').style.transform = 'scaleX(' + (CONFIG.nitro.amount / 100) + ')';
            document.getElementById('speed-val').innerText = Math.floor(CONFIG.speed.current * 180 + Math.random() * 5);
            STATE.score += Math.floor(CONFIG.speed.current * 2);
            document.getElementById('score-val').innerText = STATE.score;

            flame.visible = isBoosting;
            if (isBoosting) {
                flame.scale.set(1, 1 + Math.random() * 0.5, 1);
                carLight.intensity = 15 + Math.random() * 5;
            } else {
                carLight.intensity = 15;
            }

            // Player steering
            if (STATE.playing && !STATE.gameOver) {
                if (keys.a) playerVelX -= 60 * delta;
                if (keys.d) playerVelX += 60 * delta;
                playerVelX *= 0.92;
                playerX += playerVelX * delta;
                const limit = CONFIG.laneWidth * 1.6;
                if (playerX > limit) { playerX = limit; playerVelX = 0; }
                if (playerX < -limit) { playerX = -limit; playerVelX = 0; }
            }

            // Car position follows playerX relative to road center
            const playerInfo = PATH.getInfo(STATE.playerRoadDist);
            carGroup.position.set(playerX, 0, 0);
            carGroup.rotation.z = -playerVelX * 0.03;
            carGroup.rotation.y = -playerInfo.angle + (-playerVelX * 0.015);
            carGroup.userData.wheels.forEach(w => w.rotation.x += activeSpeed * 0.5);

            const lookAhead = 20;
            carLight.target.position.set(
                Math.sin(playerInfo.angle) * lookAhead,
                playerInfo.slope * 3,
                -Math.cos(playerInfo.angle) * lookAhead
            );

            // Update road, lights, buildings
            ROAD.updateAll();
            LANE_MARKINGS.updateAll();
            STREET_LIGHTS.updateAll();
            BUILDINGS.updateAll();
            BRIDGE_SUPPORTS.updateAll();

            if (STATE.frame % 60 === 0) PATH.trim(STATE.playerRoadDist);

            // Zone detection for dynamic lighting
            const curZone = playerInfo.type;
            if (curZone !== lastZoneType) {
                lastZoneType = curZone;
                if (curZone === 'bridge') {
                    zoneAmbient.target = 0x224466;
                    zoneAmbient.targetIntensity = 0.55;
                    zoneLight.color.setHex(0x4488cc);
                    zoneLight.intensity = 8;
                } else if (curZone === 'tunnel') {
                    zoneAmbient.target = 0x110022;
                    zoneAmbient.targetIntensity = 0.25;
                    zoneLight.color.setHex(0x00aaff);
                    zoneLight.intensity = 15;
                } else {
                    zoneAmbient.target = 0x404040;
                    zoneAmbient.targetIntensity = 0.4;
                    zoneLight.color.setHex(0xffaa00);
                    zoneLight.intensity = 0;
                }
            }
            ambientLight.color.setHex(
                new THREE.Color(zoneAmbient.current).lerp(new THREE.Color(zoneAmbient.target), 0.03).getHex()
            );
            zoneAmbient.intensity += (zoneAmbient.targetIntensity - zoneAmbient.intensity) * 0.03;
            zoneLight.position.set(5, 12, -10);
            zoneLight.intensity += ((curZone === 'bridge' ? 8 : (curZone === 'tunnel' ? 15 : 0)) - zoneLight.intensity) * 0.05;

            // Enemies update
            const enemyMinDist = STATE.playerRoadDist - 30;
            const enemyMaxDist = STATE.playerRoadDist + 300;
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                let erd = e.userData.roadDist;
                if (STATE.playing) erd += (CONFIG.speed.current * 80 - 25) * delta;
                e.userData.roadDist = erd;

                if (erd < enemyMinDist || erd > enemyMaxDist) {
                    recycleEnemy(e);
                    enemies.splice(i, 1);
                    continue;
                }

                const eInfo = PATH.getInfo(erd);
                const pInfo = PATH.getInfo(STATE.playerRoadDist);
                const perpX = -Math.cos(eInfo.angle);
                const perpZ = -Math.sin(eInfo.angle);
                e.position.set(
                    eInfo.x - pInfo.x + perpX * e.userData.laneOffset,
                    eInfo.y - pInfo.y,
                    pInfo.z - eInfo.z + perpZ * e.userData.laneOffset
                );
                e.rotation.y = -eInfo.angle;
                e.userData.wheels.forEach(w => w.rotation.x += 0.3);

                if (Math.random() < 0.01) e.userData.targetLane = (Math.random() - 0.5) * 8;
                if (e.userData.targetLane !== undefined)
                    e.userData.laneOffset += (e.userData.targetLane - e.userData.laneOffset) * 0.02;

                if (CONFIG.cheats.chaos) {
                    e.rotation.y += 0.1;
                    e.userData.laneOffset += Math.sin(time * 10) * 0.1;
                }

                const dx = e.position.x - carGroup.position.x;
                const dy = e.position.y - carGroup.position.y;
                const dz = e.position.z - carGroup.position.z;
                if (Math.abs(dz) < 3.5 && Math.abs(dx) < 2.0 && Math.abs(dy) < 2.0) {
                    if (!CONFIG.cheats.god && STATE.playing) {
                        createExplosion(e.position, 0xff0000);
                        STATE.lives--;
                        updateLifeUI();
                        CONFIG.speed.current *= 0.5;
                        CONFIG.camera.shake = 1.2;
                        document.querySelector('.warning-text').style.display = 'block';
                        setTimeout(() => document.querySelector('.warning-text').style.display = 'none', 500);
                        e.userData.roadDist += 15;
                        e.userData.laneOffset += (e.userData.laneOffset > playerX ? 4 : -4);
                        if (STATE.lives <= 0) gameOver();
                    } else if (CONFIG.cheats.god) {
                        createExplosion(e.position, 0xffaa00);
                        recycleEnemy(e);
                        enemies.splice(i, 1);
                        STATE.score += 100;
                    }
                }
            }

            // Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.position.z -= 120 * delta;
                p.rotation.y += 15 * delta;
                let hit = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (p.position.distanceTo(enemies[j].position) < 3) {
                        createExplosion(enemies[j].position, CONFIG.cheats.chaos ? 0xff00ff : 0xff5500);
                        recycleEnemy(enemies[j]);
                        enemies.splice(j, 1);
                        hit = true;
                        STATE.score += 500;
                        break;
                    }
                }
                if (hit || p.position.z < -300) {
                    scene.remove(p);
                    projectiles.splice(i, 1);
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.02;
                p.rotation.x += 0.1;
                p.userData.life -= 0.03;
                p.material.opacity = p.userData.life;
                p.scale.multiplyScalar(0.94);
                if (p.userData.life <= 0 || p.scale.x < 0.01) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }

            // Camera
            const shakeX = (Math.random() - 0.5) * CONFIG.camera.shake;
            const shakeY = (Math.random() - 0.5) * CONFIG.camera.shake;
            CONFIG.camera.shake *= 0.9;
            const pathAngle = playerInfo.angle;
            const pathSlope = playerInfo.slope;
            const behindDist = 9 + CONFIG.speed.current * 2;
            const cosA = Math.cos(pathAngle);
            const sinA = Math.sin(pathAngle);
            const camLocalX = playerX * 0.4 + shakeX;
            const camLocalY = 4 + shakeY + Math.abs(playerVelX) * 0.02;
            const camLocalZ = behindDist;
            camera.position.x = camLocalX * cosA - camLocalZ * sinA;
            camera.position.z = camLocalX * sinA + camLocalZ * cosA;
            camera.position.y = camLocalY;
            if (CONFIG.cheats.chaos) camera.position.x += (Math.random() - 0.5) * 0.2;
            const lookAheadDist = 20;
            const lookLocalX = playerX * 0.1;
            const lookLocalZ = -lookAheadDist;
            const lookX = lookLocalX * cosA - lookLocalZ * sinA;
            const lookZ = lookLocalX * sinA + lookLocalZ * cosA;
            camera.lookAt(lookX, pathSlope * lookAheadDist, lookZ);

            composer.render();
            STATE.frame++;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
